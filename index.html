<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>OEC Ops — Command Center</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Outfit:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#F5F0E8; --bg2:#EDE6D6; --white:#FFFEFB;
  --gold:#A67C2E; --gold-b:#C49A3C; --gold-d:#7A5B1E;
  --gold-a:rgba(166,124,46,.14); --gold-b2:rgba(196,154,60,.25);
  --tx:#1C1208; --txm:#3D2B18; --txd:#6B5030; --txf:#9B7A55;
  --bdr:rgba(166,124,46,.2); --bdr-s:rgba(166,124,46,.45);
  --shadow:rgba(44,24,16,.08);
  --fd:'Playfair Display',Georgia,serif;
  --ff:'Outfit',system-ui,sans-serif;
  --fm:'Space Mono',monospace;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;overflow:hidden;background:var(--bg);color:var(--tx);font-family:var(--ff);-webkit-font-smoothing:antialiased;user-select:none}

/* BG */
.bg{position:fixed;inset:0;z-index:0}
.bg-g{position:absolute;inset:0;
  background:radial-gradient(ellipse 90% 70% at 15% 5%,#E8DCCA 0%,transparent 50%),
             radial-gradient(ellipse 70% 60% at 85% 95%,#EDDFCC 0%,transparent 50%),
             radial-gradient(ellipse 50% 50% at 50% 50%,#EDE6D8 0%,transparent 65%),#F5F0E8;
  animation:bgbr 14s ease-in-out infinite alternate}
@keyframes bgbr{0%{filter:brightness(1)}60%{filter:brightness(1.04)}100%{filter:brightness(.98)}}
.bg-vg{position:absolute;inset:0;background:radial-gradient(ellipse 80% 80% at 50% 50%,transparent 45%,rgba(196,168,120,.12) 100%);pointer-events:none}

/* PARTICLES */
#pcv{position:fixed;inset:0;z-index:1;pointer-events:none}

/* LAYOUT */
.wrap{position:fixed;inset:0;z-index:10;display:flex;flex-direction:column}

/* ── TOPBAR ── */
.top{height:56px;flex-shrink:0;display:flex;align-items:center;justify-content:space-between;padding:0 20px;
  background:rgba(255,254,251,.92);backdrop-filter:blur(24px);
  border-bottom:1px solid var(--bdr);position:relative;z-index:20;gap:10px}
.top::after{content:'';position:absolute;bottom:-1px;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent,var(--gold),rgba(196,154,60,.8),var(--gold),transparent)}
.brand{display:flex;align-items:center;gap:10px;flex-shrink:0}
.emb{position:relative;width:36px;height:36px;flex-shrink:0}
.emb-r{position:absolute;inset:0;border-radius:50%;border:1.5px solid var(--gold);animation:es 9s linear infinite}
.emb-r::before{content:'';position:absolute;top:-3px;left:50%;transform:translateX(-50%);width:5px;height:5px;border-radius:50%;background:var(--gold-b);box-shadow:0 0 8px var(--gold)}
.emb-c{position:absolute;inset:5px;border-radius:50%;background:linear-gradient(135deg,#D4A84B,#8B6520);display:flex;align-items:center;justify-content:center;font-size:13px}
@keyframes es{to{transform:rotate(360deg)}}
.bt{display:flex;flex-direction:column;gap:1px}
.bn{font-family:var(--fd);font-size:13px;letter-spacing:.5px;color:var(--tx);font-weight:600}
.bs{font-size:8px;letter-spacing:2px;color:var(--gold);text-transform:uppercase;font-weight:600}
.tmid{position:absolute;left:50%;transform:translateX(-50%)}
@media(max-width:640px){.tmid{display:none}}
.sok{display:flex;align-items:center;gap:6px;padding:4px 13px;background:rgba(34,197,94,.06);border:1px solid rgba(34,197,94,.22);border-radius:20px;font-size:9px;letter-spacing:1.5px;color:#16803c;text-transform:uppercase;font-family:var(--fm);white-space:nowrap}
.sdot{width:5px;height:5px;border-radius:50%;background:#22c55e;box-shadow:0 0 6px #22c55e;animation:spls 2s ease-in-out infinite}
@keyframes spls{0%,100%{opacity:1}50%{opacity:.4}}
.tr{display:flex;align-items:center;gap:10px;flex-shrink:0}
#clk{font-family:var(--fm);font-size:11px;color:var(--txd);letter-spacing:1px;min-width:72px;text-align:right}
@media(max-width:480px){#clk{display:none}}
.rsw{display:flex;background:var(--gold-a);border:1px solid var(--bdr);border-radius:20px;padding:3px;gap:2px}
.rb{padding:4px 11px;border-radius:16px;border:none;background:transparent;color:var(--txd);font-size:9px;font-family:var(--ff);font-weight:600;letter-spacing:.8px;text-transform:uppercase;cursor:pointer;transition:all .2s}
.rb.on{background:linear-gradient(135deg,var(--gold),var(--gold-d));color:#FFFEFB;box-shadow:0 2px 12px rgba(166,124,46,.35)}
.rb:hover:not(.on){color:var(--tx);background:rgba(166,124,46,.1)}

/* ── STAGE ── */
.stage{flex:1;min-height:0;display:flex;flex-direction:column;overflow:hidden}

/* Carousel area (top) */
.carousel-area{flex:1;min-height:0;position:relative;overflow:hidden}
.rings{position:absolute;inset:0;pointer-events:none;z-index:1}
.ring{position:absolute;border-radius:50%}
.r1{border:1.5px solid rgba(166,124,46,.22);animation:rp1 5s ease-in-out infinite alternate}
.r2{border:1px solid rgba(166,124,46,.12);animation:rp2 7s ease-in-out infinite alternate}
.r3{border:1px solid rgba(166,124,46,.06);animation:rp3 10s ease-in-out infinite alternate}
@keyframes rp1{0%{opacity:.5;box-shadow:0 0 20px rgba(166,124,46,.06)}100%{opacity:1;box-shadow:0 0 60px rgba(166,124,46,.18)}}
@keyframes rp2{0%{opacity:.3}100%{opacity:.8}}
@keyframes rp3{0%{opacity:.2}100%{opacity:.6}}
#cv{position:absolute;inset:0;z-index:2;cursor:grab;touch-action:none}
#cv.drag{cursor:grabbing}
#amb{position:absolute;inset:0;z-index:1;pointer-events:none;transition:background 1.2s ease}
.hint{position:absolute;top:14px;left:50%;transform:translateX(-50%);font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--txf);display:flex;align-items:center;gap:8px;pointer-events:none;z-index:5;animation:hfa 4s ease-in-out infinite;white-space:nowrap}
@keyframes hfa{0%,100%{opacity:.4}50%{opacity:.9}}
#rst{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;display:none;z-index:6}
#rst h2{font-family:var(--fd);font-size:16px;letter-spacing:2px;color:var(--txd);margin-bottom:6px}
#rst p{font-size:11px;color:var(--txf);letter-spacing:1px}

/* ── INFO PANEL (no-overlap, below carousel) ── */
.info-panel{flex-shrink:0;background:rgba(255,254,251,.96);backdrop-filter:blur(20px);border-top:1px solid var(--bdr);padding:16px 20px 18px;display:flex;flex-direction:column;align-items:center;gap:10px;z-index:5}
.info-panel.hidden{display:none}
.ip-name{font-family:var(--fd);font-size:20px;font-weight:700;letter-spacing:.5px;text-align:center;opacity:0;transform:translateY(10px);transition:opacity .35s ease,transform .4s cubic-bezier(.34,1.56,.64,1)}
.ip-name.in{opacity:1;transform:translateY(0)}
.ip-sub{font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--txd);text-align:center;opacity:0;transform:translateY(6px);transition:opacity .3s ease .05s,transform .35s ease .05s}
.ip-sub.in{opacity:1;transform:translateY(0)}
.ip-stats{display:flex;width:100%;max-width:420px;background:var(--white);border:1px solid var(--bdr);border-radius:14px;overflow:hidden;opacity:0;transform:translateY(12px) scale(.96);transition:opacity .38s ease .08s,transform .4s cubic-bezier(.34,1.56,.64,1) .08s}
.ip-stats.in{opacity:1;transform:translateY(0) scale(1)}
.ip-sc{flex:1;padding:12px 10px;display:flex;flex-direction:column;align-items:center;gap:3px;position:relative}
.ip-sc:not(:last-child)::after{content:'';position:absolute;right:0;top:18%;height:64%;width:1px;background:var(--bdr)}
.ip-sv{font-family:var(--fm);font-size:18px;font-weight:700;line-height:1;transition:color .3s}
.ip-sl{font-size:7.5px;letter-spacing:1.2px;text-transform:uppercase;color:var(--txf);white-space:nowrap}
.ip-btns{display:flex;gap:8px;opacity:0;transform:translateY(8px);transition:opacity .35s ease .14s,transform .38s ease .14s}
.ip-btns.in{opacity:1;transform:translateY(0)}
.ip-btn-p{padding:10px 22px;border-radius:10px;border:none;font-family:var(--ff);font-size:13px;font-weight:700;cursor:pointer;transition:all .18s;background:linear-gradient(135deg,var(--gold-b),var(--gold-d));color:#FFFEFB;box-shadow:0 4px 16px rgba(166,124,46,.35)}
.ip-btn-p:hover{filter:brightness(1.1);transform:translateY(-1px)}
.ip-btn-p:active{transform:scale(.97)}
.ip-btn-s{padding:10px 16px;border-radius:10px;background:var(--gold-a);border:1px solid var(--bdr);color:var(--txd);font-family:var(--ff);font-size:12px;cursor:pointer;transition:all .18s}
.ip-btn-s:hover{background:rgba(166,124,46,.2);color:var(--tx)}

/* ── STATUS BAR ── */
.sbar{height:26px;flex-shrink:0;display:flex;align-items:center;justify-content:space-between;padding:0 20px;background:rgba(255,254,251,.9);border-top:1px solid var(--bdr);font-family:var(--fm);font-size:8px;letter-spacing:.8px;color:var(--txf)}
.sbl{display:flex;align-items:center;gap:5px}
.sbl::before{content:'';width:4px;height:4px;border-radius:50%;background:#22c55e;box-shadow:0 0 5px #22c55e}
@media(max-width:640px){.sbar{display:none}}

/* ── TOAST ── */
#toast{position:fixed;top:66px;left:50%;transform:translateX(-50%) translateY(-10px);background:var(--white);border:1px solid var(--bdr-s);border-radius:12px;padding:10px 20px;font-size:12.5px;color:var(--txm);box-shadow:0 8px 30px rgba(44,24,16,.12);opacity:0;transition:all .35s cubic-bezier(.34,1.56,.64,1);pointer-events:none;z-index:999;white-space:nowrap;max-width:90vw;overflow:hidden;text-overflow:ellipsis}
#toast.on{opacity:1;transform:translateX(-50%) translateY(0)}

/* ══════════════════════════════════════
   DETAIL OVERLAY — LIGHT THEME
══════════════════════════════════════ */
#detail{position:fixed;inset:0;z-index:200;background:var(--bg);transform:translateX(102%);transition:transform .48s cubic-bezier(.25,.46,.45,.94);display:flex;flex-direction:column;overflow:hidden}
#detail.open{transform:translateX(0)}
#detail.closing{transform:translateX(102%)}
.d-top{height:56px;flex-shrink:0;display:flex;align-items:center;gap:14px;padding:0 20px;background:rgba(255,254,251,.95);backdrop-filter:blur(24px);border-bottom:1px solid var(--bdr);position:relative;z-index:5}
.d-top::after{content:'';position:absolute;bottom:-1px;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--gold),rgba(196,154,60,.8),var(--gold),transparent)}
.back-btn{display:flex;align-items:center;gap:6px;padding:6px 13px;background:var(--gold-a);border:1px solid var(--bdr);border-radius:9px;color:var(--txd);font-size:12px;font-family:var(--ff);cursor:pointer;transition:all .18s;flex-shrink:0;white-space:nowrap}
.back-btn:hover{background:rgba(166,124,46,.2);color:var(--tx);transform:translateX(-2px)}
.d-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.d-title{font-family:var(--fd);font-size:15px;font-weight:700;letter-spacing:.5px}
.d-sub{font-size:9px;letter-spacing:1.5px;text-transform:uppercase;color:var(--txd)}
.d-top-right{margin-left:auto;display:flex;align-items:center;gap:10px;flex-shrink:0}
.d-badge{padding:3px 10px;border:1px solid var(--bdr);border-radius:20px;font-size:8.5px;letter-spacing:1px;text-transform:uppercase;color:var(--gold);font-family:var(--fm)}
#d-clk2{font-family:var(--fm);font-size:10.5px;color:var(--txd)}
@media(max-width:480px){#d-clk2{display:none}}

/* Detail body */
.d-body{flex:1;overflow-y:auto;overflow-x:hidden;padding:22px 20px 28px;scrollbar-width:thin;scrollbar-color:var(--gold-a) transparent}
.d-body::-webkit-scrollbar{width:3px}
.d-body::-webkit-scrollbar-thumb{background:var(--bdr-s);border-radius:2px}

/* Stat cards */
.d-stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:10px;margin-bottom:24px}
.d-stat{background:var(--white);border:1px solid var(--bdr);border-radius:14px;padding:16px 18px;display:flex;flex-direction:column;gap:4px;position:relative;overflow:hidden;transition:border-color .2s,box-shadow .2s}
.d-stat:hover{border-color:var(--bdr-s);box-shadow:0 4px 16px var(--shadow)}
.d-stat::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--gold)}
.dst-v{font-family:var(--fm);font-size:24px;font-weight:700;line-height:1;color:var(--tx)}
.dst-l{font-size:8.5px;letter-spacing:1.5px;text-transform:uppercase;color:var(--txf)}
.dst-ch{font-size:10px;color:#16803c;font-family:var(--fm);margin-top:2px}

/* Section header */
.d-sh{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;margin-top:24px}
.d-sh:first-of-type{margin-top:0}
.d-sh-title{font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--txd);font-weight:600}
.d-sh-action{font-size:11px;color:var(--gold);cursor:pointer;transition:color .18s;background:none;border:none;font-family:var(--ff);font-weight:600}
.d-sh-action:hover{color:var(--gold-d)}

/* Table */
.d-tbl-wrap{background:var(--white);border:1px solid var(--bdr);border-radius:14px;overflow:hidden;box-shadow:0 2px 12px var(--shadow)}
.d-tbl{width:100%;border-collapse:collapse;font-size:12.5px}
.d-tbl th{font-size:8px;letter-spacing:1.5px;text-transform:uppercase;color:var(--txf);font-weight:600;padding:12px 14px 10px;text-align:left;border-bottom:1px solid var(--bdr);background:rgba(166,124,46,.04)}
.d-tbl td{padding:12px 14px;border-bottom:1px solid rgba(166,124,46,.06);color:var(--txm);vertical-align:middle}
.d-tbl td:first-child{color:var(--tx);font-weight:600}
.d-tbl tr:last-child td{border-bottom:none}
.d-tbl tr:hover td{background:rgba(166,124,46,.03)}

/* Badges */
.badge{display:inline-flex;align-items:center;gap:4px;padding:2px 9px;border-radius:20px;font-size:8.5px;letter-spacing:.8px;text-transform:uppercase;font-family:var(--fm);border:1px solid;white-space:nowrap}
.badge::before{content:'';width:4px;height:4px;border-radius:50%;background:currentColor;flex-shrink:0}
.badge-green{color:#15803d;border-color:rgba(21,128,61,.3);background:rgba(21,128,61,.08)}
.badge-amber{color:#92400e;border-color:rgba(146,64,14,.3);background:rgba(146,64,14,.08)}
.badge-blue{color:#1d4ed8;border-color:rgba(29,78,216,.25);background:rgba(29,78,216,.07)}
.badge-red{color:#dc2626;border-color:rgba(220,38,38,.3);background:rgba(220,38,38,.08)}
.badge-grey{color:var(--txd);border-color:var(--bdr);background:var(--gold-a)}
.badge-purple{color:#7c3aed;border-color:rgba(124,58,237,.3);background:rgba(124,58,237,.08)}
.proc-washed{color:#1d4ed8;border-color:rgba(29,78,216,.25);background:rgba(29,78,216,.07)}
.proc-honey{color:#92400e;border-color:rgba(146,64,14,.3);background:rgba(146,64,14,.08)}
.proc-natural{color:#15803d;border-color:rgba(21,128,61,.3);background:rgba(21,128,61,.08)}
.proc-anaerobic{color:#7c3aed;border-color:rgba(124,58,237,.3);background:rgba(124,58,237,.08)}

/* Cards */
.d-cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:12px}
.d-card{background:var(--white);border:1px solid var(--bdr);border-radius:14px;padding:16px 18px;transition:all .2s;cursor:pointer;box-shadow:0 2px 8px var(--shadow)}
.d-card:hover{border-color:var(--bdr-s);box-shadow:0 6px 20px var(--shadow);transform:translateY(-2px)}

/* Progress */
.prog-wrap{display:flex;align-items:center;gap:8px}
.prog-bar{flex:1;height:5px;background:rgba(166,124,46,.12);border-radius:3px;overflow:hidden}
.prog-fill{height:100%;border-radius:3px}
.prog-label{font-family:var(--fm);font-size:10px;color:var(--txd);white-space:nowrap}

/* Score bars */
.score-row{display:flex;align-items:center;gap:8px;margin-bottom:9px}
.score-name{font-size:11px;color:var(--txd);width:90px;flex-shrink:0}
.score-bar{flex:1;height:6px;background:rgba(166,124,46,.12);border-radius:3px;overflow:hidden}
.score-fill{height:100%;border-radius:3px;background:linear-gradient(90deg,var(--gold),var(--gold-b))}
.score-val{font-family:var(--fm);font-size:10px;color:var(--tx);width:30px;text-align:right}

/* Chart */
.chart-wrap{background:var(--white);border:1px solid var(--bdr);border-radius:14px;padding:18px;margin-bottom:12px;box-shadow:0 2px 8px var(--shadow)}

/* Profile cards */
.prof-card{background:var(--white);border:1px solid var(--bdr);border-radius:12px;padding:14px 16px;display:flex;flex-direction:column;gap:8px;transition:all .2s;cursor:pointer;box-shadow:0 2px 6px var(--shadow)}
.prof-card:hover{border-color:var(--bdr-s);box-shadow:0 6px 18px var(--shadow);transform:translateY(-1px)}
.prof-name{font-weight:700;font-size:13.5px;color:var(--tx);display:flex;align-items:center;justify-content:space-between}
.prof-detail{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-top:4px}
.prof-kv{display:flex;flex-direction:column;gap:1px}
.prof-k{font-size:7.5px;letter-spacing:1px;text-transform:uppercase;color:var(--txf)}
.prof-v{font-size:12px;font-family:var(--fm);color:var(--txm)}

/* Contacts */
.contact-card{background:var(--white);border:1px solid var(--bdr);border-radius:12px;padding:14px 16px;display:flex;align-items:center;gap:12px;transition:all .2s;cursor:pointer;box-shadow:0 2px 6px var(--shadow)}
.contact-card:hover{border-color:var(--bdr-s);box-shadow:0 6px 18px var(--shadow)}
.contact-av{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;flex-shrink:0;font-family:var(--ff)}
.contact-name{font-weight:700;font-size:13.5px;color:var(--tx)}
.contact-co{font-size:11px;color:var(--txd)}
.contact-email{font-size:9.5px;color:var(--txf);font-family:var(--fm);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

/* Journal */
.jentry{background:var(--white);border:1px solid var(--bdr);border-radius:12px;padding:16px 18px;cursor:pointer;transition:all .2s;margin-bottom:10px;border-left:3px solid var(--gold);box-shadow:0 2px 6px var(--shadow)}
.jentry:hover{border-left-color:var(--gold-b);box-shadow:0 6px 18px var(--shadow);transform:translateX(3px)}
.je-head{display:flex;align-items:flex-start;justify-content:space-between;gap:10px;margin-bottom:7px}
.je-title{font-weight:700;font-size:14px;color:var(--tx);font-family:var(--fd)}
.je-date{font-family:var(--fm);font-size:9px;color:var(--txf);white-space:nowrap;margin-top:2px}
.je-excerpt{font-size:12px;color:var(--txd);line-height:1.6}
.je-tags{display:flex;gap:5px;margin-top:9px;flex-wrap:wrap}
.je-tag{padding:2px 8px;border-radius:10px;font-size:8.5px;letter-spacing:.5px;background:var(--gold-a);border:1px solid var(--bdr);color:var(--gold-d)}

/* Label preview */
.label-preview{background:var(--white);border:1px solid var(--bdr);border-radius:14px;padding:18px;display:flex;gap:16px;align-items:flex-start;box-shadow:0 2px 8px var(--shadow)}
.qr-block{width:90px;height:90px;flex-shrink:0;background:var(--white);border:1px solid var(--bdr);border-radius:8px;display:flex;align-items:center;justify-content:center;overflow:hidden}
.label-info{flex:1;display:flex;flex-direction:column;gap:6px}
.label-k{font-size:7.5px;letter-spacing:1.5px;text-transform:uppercase;color:var(--txf)}
.label-v{font-size:13px;font-weight:600;color:var(--tx)}

/* Search bar */
.search-bar{display:flex;align-items:center;gap:8px;background:var(--white);border:1px solid var(--bdr);border-radius:11px;padding:9px 14px;margin-bottom:16px;box-shadow:0 2px 6px var(--shadow)}
.search-bar input{flex:1;background:none;border:none;outline:none;color:var(--tx);font-size:13px;font-family:var(--ff)}
.search-bar input::placeholder{color:var(--txf)}

/* Session cards */
.sess-card{background:var(--white);border:1px solid var(--bdr);border-radius:12px;padding:14px 16px;margin-bottom:10px;box-shadow:0 2px 6px var(--shadow)}
.sess-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.sess-temp{font-family:var(--fm);font-size:22px;font-weight:700}

/* Action buttons */
.d-action-btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;background:var(--gold-a);border:1px solid var(--bdr);border-radius:9px;color:var(--txm);font-size:11.5px;font-family:var(--ff);cursor:pointer;transition:all .18s;font-weight:500}
.d-action-btn:hover{background:rgba(166,124,46,.2);color:var(--tx)}
.d-action-btn.primary{background:linear-gradient(135deg,var(--gold-b),var(--gold-d));border-color:transparent;color:#FFFEFB;font-weight:700}
.d-action-btn.primary:hover{filter:brightness(1.1);transform:translateY(-1px)}
</style>
</head>
<body>
<div class="bg"><div class="bg-g"></div><div class="bg-vg"></div></div>
<canvas id="pcv"></canvas>

<!-- ══ MAIN UI ══ -->
<div class="wrap">
  <header class="top">
    <div class="brand">
      <div class="emb"><div class="emb-r"></div><div class="emb-c">☕</div></div>
      <div class="bt"><div class="bn">One Estate Coffee</div><div class="bs">Ops Center</div></div>
    </div>
    <div class="tmid"><div class="sok"><div class="sdot"></div>All systems nominal</div></div>
    <div class="tr">
      <div id="clk"></div>
      <div class="rsw">
        <button class="rb on" data-role="admin">Admin</button>
        <button class="rb" data-role="roaster">Roast</button>
        <button class="rb" data-role="viewer">View</button>
      </div>
    </div>
  </header>

  <div class="stage">
    <!-- Carousel -->
    <div class="carousel-area" id="carousel-area">
      <div id="amb"></div>
      <div class="rings" id="ringsEl">
        <div class="ring r1" id="r1"></div>
        <div class="ring r2" id="r2"></div>
        <div class="ring r3" id="r3"></div>
      </div>
      <canvas id="cv"></canvas>
      <div class="hint">◀ &nbsp; swipe to navigate &nbsp; ▶</div>
      <div id="rst"><h2>RESTRICTED</h2><p>No modules for this role</p></div>
    </div>

    <!-- Info panel — separate from canvas, no overlap -->
    <div class="info-panel" id="info-panel">
      <div class="ip-name" id="ip-name">—</div>
      <div class="ip-sub" id="ip-sub">—</div>
      <div class="ip-stats" id="ip-stats">
        <div class="ip-sc"><div class="ip-sv" id="s0">—</div><div class="ip-sl" id="l0">—</div></div>
        <div class="ip-sc"><div class="ip-sv" id="s1">—</div><div class="ip-sl" id="l1">—</div></div>
        <div class="ip-sc"><div class="ip-sv" id="s2">—</div><div class="ip-sl" id="l2">—</div></div>
      </div>
      <div class="ip-btns" id="ip-btns">
        <button class="ip-btn-p" id="btn-open" onclick="openMod()">Open Module ↗</button>
        <button class="ip-btn-s" onclick="openMod()">Details</button>
      </div>
    </div>
  </div>

  <div class="sbar">
    <div class="sbl">OEC OPS PLATFORM — PREVIEW v2.0</div>
    <div id="dbar">—</div>
    <div>TENANT: OEC_MAIN</div>
  </div>
</div>

<!-- ══ DETAIL OVERLAY ══ -->
<div id="detail">
  <div class="d-top">
    <button class="back-btn" onclick="closeDetail()">← Back</button>
    <div style="display:flex;align-items:center;gap:8px;min-width:0">
      <div class="d-dot" id="d-dot"></div>
      <div style="min-width:0">
        <div class="d-title" id="d-title">—</div>
        <div class="d-sub" id="d-sub-d">—</div>
      </div>
    </div>
    <div class="d-top-right">
      <div class="d-badge">PREVIEW</div>
      <div id="d-clk2"></div>
    </div>
  </div>
  <div class="d-body" id="d-body"></div>
</div>

<div id="toast"></div>

<script>
/* ── DATA ── */
const MODS=[
  {id:'inventory',name:'Inventory',sub:'Green Lots & Stock Overview',
   col:'#22c55e',rgb:[34,197,94],roles:['admin','roaster','viewer'],
   st:[{v:'12',l:'Active Lots'},{v:'847',l:'KG Stock'},{v:'3',l:'Origins'}],icon:'box'},
  {id:'roast',name:'Roast Sessions',sub:'Active & Scheduled Roasts',
   col:'#ef4444',rgb:[239,68,68],roles:['admin','roaster'],
   st:[{v:'3',l:'Active Now'},{v:'7',l:'Scheduled'},{v:'24',l:'This Month'}],icon:'flame'},
  {id:'cupping',name:'Cupping',sub:'Scoring & Session History',
   col:'#7c3aed',rgb:[124,58,237],roles:['admin','roaster','viewer'],
   st:[{v:'8',l:'Sessions'},{v:'92.4',l:'Avg Score'},{v:'5',l:'Pending'}],icon:'cup'},
  {id:'alloc',name:'Allocations',sub:'Buyer Allocations & Requests',
   col:'#A67C2E',rgb:[166,124,46],roles:['admin','roaster','viewer'],
   st:[{v:'18',l:'Allocations'},{v:'4',l:'Pending'},{v:'320',l:'KG Alloc.'}],icon:'chart'},
  {id:'labels',name:'Labels',sub:'QR Label Generation',
   col:'#0e7490',rgb:[14,116,144],roles:['admin','roaster'],
   st:[{v:'142',l:'Generated'},{v:'12',l:'Today'},{v:'99%',l:'Scan Rate'}],icon:'qr'},
  {id:'profiles',name:'Roast Profiles',sub:'Saved Roast Curves',
   col:'#c2410c',rgb:[194,65,12],roles:['admin','roaster'],
   st:[{v:'24',l:'Profiles'},{v:'6',l:'Active'},{v:'92%',l:'Accuracy'}],icon:'graph'},
  {id:'contacts',name:'Contacts',sub:'Buyer & Partner Directory',
   col:'#be185d',rgb:[190,24,93],roles:['admin'],
   st:[{v:'56',l:'Contacts'},{v:'12',l:'Buyers'},{v:'8',l:'Partners'}],icon:'people'},
  {id:'journal',name:'Journal',sub:'Documentation & Entries',
   col:'#4d7c0f',rgb:[77,124,15],roles:['admin','roaster','viewer'],
   st:[{v:'34',l:'Entries'},{v:'5',l:'This Week'},{v:'2',l:'Drafts'}],icon:'book'}
];

/* ── STATE ── */
let role='admin',vis=[],selIdx=0;
let angle=0,target=0,vel=0;
let dragging=false,dragX0=0,dragA0=0,prevX=0,prevT=0,momV=0;
let idle=0,W=0,H=0,cx=0,cy=0,orx=0,ory=0;
let cv,ctx,pcv,pctx,dpr=1,lastTs=0,pts=[];

/* ── INIT ── */
window.addEventListener('DOMContentLoaded',()=>{
  cv=document.getElementById('cv'); ctx=cv.getContext('2d');
  pcv=document.getElementById('pcv'); pctx=pcv.getContext('2d');
  dpr=window.devicePixelRatio||1;

  document.getElementById('dbar').textContent=
    new Date().toLocaleDateString('en-US',{weekday:'short',year:'numeric',month:'short',day:'numeric'}).toUpperCase();

  const tickClk=()=>{
    const t=new Date().toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit',second:'2-digit',hour12:false});
    document.getElementById('clk').textContent=t;
    const d2=document.getElementById('d-clk2');if(d2)d2.textContent=t;
  };
  tickClk();setInterval(tickClk,1000);

  document.querySelectorAll('.rb').forEach(b=>{
    b.addEventListener('click',()=>{
      document.querySelectorAll('.rb').forEach(x=>x.classList.remove('on'));
      b.classList.add('on');role=b.dataset.role;switchRole();
    });
  });

  for(let i=0;i<50;i++)pts.push(mkPt(true));
  window.addEventListener('resize',()=>{doResize();posRings();});
  doResize();
  switchRole(true);
  setTimeout(()=>showPanel(selIdx),100);
  requestAnimationFrame(loop);
});

/* ── RESIZE (DPR-aware) ── */
function doResize(){
  dpr=window.devicePixelRatio||1;
  const ca=document.getElementById('carousel-area');
  W=ca.clientWidth; H=ca.clientHeight;
  cv.width=Math.round(W*dpr); cv.height=Math.round(H*dpr);
  cv.style.width=W+'px'; cv.style.height=H+'px';
  ctx.setTransform(dpr,0,0,dpr,0,0);
  pcv.width=Math.round(window.innerWidth*dpr); pcv.height=Math.round(window.innerHeight*dpr);
  pcv.style.width=window.innerWidth+'px'; pcv.style.height=window.innerHeight+'px';
  pctx.setTransform(dpr,0,0,dpr,0,0);
  cx=W/2; cy=H/2;
  const m=Math.min(W,H);
  orx=m*0.38; ory=m*0.15;
  posRings();
}
function posRings(){
  const ca=document.getElementById('carousel-area'),rect=ca.getBoundingClientRect();
  [[1,1.1,1.18],[2,1.24,1.34],[3,1.4,1.52]].forEach(([i,mx,my])=>{
    const el=document.getElementById('r'+i),erx=orx*mx,ery=ory*my;
    el.style.cssText=`width:${erx*2}px;height:${ery*2}px;left:${rect.left+cx-erx}px;top:${rect.top+cy-ery}px;`;
  });
}

/* ── PARTICLES ── */
function mkPt(rand){
  return{x:Math.random()*window.innerWidth,y:rand?Math.random()*window.innerHeight:window.innerHeight+5,
    r:.4+Math.random()*1.6,sp:.15+Math.random()*.45,op:.06+Math.random()*.18,
    dr:(Math.random()-.5)*.22,c:Math.random()>.5?[166,124,46]:[196,154,60]};
}
function drawPts(){
  pctx.clearRect(0,0,window.innerWidth,window.innerHeight);
  pts.forEach((p,i)=>{
    p.y-=p.sp;p.x+=p.dr;if(p.y<-8)pts[i]=mkPt(false);
    pctx.beginPath();pctx.arc(p.x,p.y,p.r,0,Math.PI*2);
    pctx.fillStyle=`rgba(${p.c[0]},${p.c[1]},${p.c[2]},${p.op})`;pctx.fill();
  });
}

/* ── ROLE ── */
function switchRole(initial=false){
  vis=MODS.filter(m=>m.roles.includes(role));
  const rst=document.getElementById('rst'),ip=document.getElementById('info-panel');
  if(!vis.length){rst.style.display='block';ip.classList.add('hidden');return;}
  rst.style.display='none';ip.classList.remove('hidden');
  selIdx=0;angle=Math.PI/2;target=Math.PI/2;vel=0;
  setTimeout(()=>showPanel(0),initial?100:0);
}

/* ── EVENTS ── */
window.addEventListener('load',()=>{
  cv.addEventListener('mousedown',pDown);cv.addEventListener('mousemove',pMove);
  cv.addEventListener('mouseup',pUp);cv.addEventListener('mouseleave',pUp);
  cv.addEventListener('touchstart',e=>{e.preventDefault();pDown(e.touches[0])},{passive:false});
  cv.addEventListener('touchmove',e=>{e.preventDefault();pMove(e.touches[0])},{passive:false});
  cv.addEventListener('touchend',e=>pUp(e.changedTouches[0]));
  cv.addEventListener('click',onClick);
  document.addEventListener('keydown',e=>{
    if(document.getElementById('detail').classList.contains('open')){if(e.key==='Escape')closeDetail();return;}
    if(e.key==='ArrowLeft')rotBy(1);if(e.key==='ArrowRight')rotBy(-1);if(e.key==='Enter')openMod();
  });
});
function pDown(e){dragging=true;dragX0=e.clientX;dragA0=angle;prevX=e.clientX;prevT=Date.now();momV=0;idle=0;cv.classList.add('drag')}
function pMove(e){
  if(!dragging)return;
  const dx=e.clientX-prevX,dt=Date.now()-prevT;if(dt>0)momV=dx/dt;
  prevX=e.clientX;prevT=Date.now();angle=dragA0+(e.clientX-dragX0)*0.006;target=angle;
}
function pUp(){if(!dragging)return;dragging=false;cv.classList.remove('drag');vel=momV*0.013;snapNearest();}
function onClick(e){
  if(Math.abs(e.clientX-dragX0)>10)return;
  const rect=cv.getBoundingClientRect(),mx=e.clientX-rect.left,my=e.clientY-rect.top;
  const n=vis.length,step=(Math.PI*2)/n;
  for(let i=0;i<n;i++){
    const a=angle+i*step,ix=cx+orx*Math.cos(a),iy=cy+ory*Math.sin(a);
    if(Math.hypot(mx-ix,my-iy)<60){rotToIdx(i);return;}
  }
}
function rotBy(dir){const n=vis.length;if(!n)return;selIdx=((selIdx+dir)+n)%n;target=Math.PI/2-selIdx*(Math.PI*2/n);vel=0;showPanel(selIdx);}
function rotToIdx(i){selIdx=i;target=Math.PI/2-i*(Math.PI*2/vis.length);vel=0;showPanel(i);}
function snapNearest(){
  const n=vis.length;if(!n)return;
  const step=(Math.PI*2)/n,rawI=(Math.PI/2-angle)/step,si=Math.round(rawI);
  selIdx=((si%n)+n)%n;target=Math.PI/2-si*step;showPanel(selIdx);
}

/* ── PANEL ── */
let panT=null;
function showPanel(idx){
  const m=vis[idx];if(!m)return;
  ['ip-name','ip-sub','ip-stats','ip-btns'].forEach(id=>document.getElementById(id).classList.remove('in'));
  clearTimeout(panT);
  panT=setTimeout(()=>{
    const nm=document.getElementById('ip-name');
    nm.textContent=m.name;nm.style.color=m.col;
    document.getElementById('ip-sub').textContent=m.sub;
    m.st.forEach((s,i)=>{document.getElementById('s'+i).textContent=s.v;document.getElementById('s'+i).style.color=m.col;document.getElementById('l'+i).textContent=s.l;});
    const bp=document.getElementById('btn-open');
    bp.textContent='Open '+m.name+' ↗';
    document.getElementById('amb').style.background=`radial-gradient(ellipse 65% 55% at 50% 60%,rgba(${m.rgb.join(',')},0.07) 0%,transparent 70%)`;
    nm.classList.add('in');
    setTimeout(()=>document.getElementById('ip-sub').classList.add('in'),45);
    setTimeout(()=>document.getElementById('ip-stats').classList.add('in'),90);
    setTimeout(()=>document.getElementById('ip-btns').classList.add('in'),135);
  },150);
}

/* ── OPEN MOD ── */
function openMod(){
  const m=vis[selIdx];if(!m)return;
  const det=document.getElementById('detail');
  document.getElementById('d-dot').style.cssText=`background:${m.col};box-shadow:0 0 8px ${m.col}40`;
  document.getElementById('d-title').textContent=m.name;
  document.getElementById('d-sub-d').textContent=m.sub;
  document.getElementById('d-body').innerHTML=renderModule(m.id);
  det.classList.remove('closing');det.classList.add('open');
  setTimeout(()=>drawDetailCharts(m.id),80);
}
function closeDetail(){
  const det=document.getElementById('detail');det.classList.add('closing');
  setTimeout(()=>det.classList.remove('open','closing'),500);
}
function showToast(msg){
  const el=document.getElementById('toast');el.textContent=msg;el.classList.add('on');
  clearTimeout(showToast._t);showToast._t=setTimeout(()=>el.classList.remove('on'),3500);
}

/* ── LOOP ── */
function loop(ts){
  const dt=Math.min((ts-lastTs)/16.67,3);lastTs=ts;
  if(!dragging){
    idle+=dt*.018;const d=target-angle;vel=vel*.75+d*.16;angle+=vel*dt;
    if(vis.length&&Math.abs(vel)>.0015){
      const step=(Math.PI*2)/vis.length,rawI=(Math.PI/2-angle)/step;
      const ni=((Math.round(rawI)%vis.length)+vis.length)%vis.length;
      if(ni!==selIdx){selIdx=ni;showPanel(ni);}
    }
  }
  drawPts();render();requestAnimationFrame(loop);
}

/* ── RENDER ── */
function render(){
  ctx.clearRect(0,0,W,H);
  const n=vis.length;if(!n)return;
  const step=(Math.PI*2)/n,bob=Math.sin(idle)*5;
  const items=vis.map((m,i)=>{
    const a=angle+i*step,x=cx+orx*Math.cos(a),y=cy+ory*Math.sin(a)+bob;
    return{m,x,y,depth:(Math.sin(a)+1)/2,sel:i===selIdx,i};
  });
  items.sort((a,b)=>a.depth-b.depth);
  drawOrbit(bob);drawCenterGlow(bob);
  items.forEach(it=>drawCard(it));
}

function drawOrbit(bob){
  ctx.save();ctx.strokeStyle='rgba(166,124,46,0.18)';ctx.lineWidth=1;
  ctx.setLineDash([4,10]);ctx.lineDashOffset=-(idle*20);
  ctx.beginPath();ctx.ellipse(cx,cy+bob,orx,ory,0,0,Math.PI*2);ctx.stroke();
  ctx.setLineDash([]);ctx.restore();
}
function drawCenterGlow(bob){
  const m=vis[selIdx];if(!m)return;
  const[r,g,b]=m.rgb;
  const gr=ctx.createRadialGradient(cx,cy+bob,0,cx,cy+bob,orx*.55);
  gr.addColorStop(0,`rgba(${r},${g},${b},.07)`);gr.addColorStop(1,'transparent');
  ctx.fillStyle=gr;ctx.beginPath();ctx.arc(cx,cy+bob,orx*.55,0,Math.PI*2);ctx.fill();
}

function drawCard(it){
  const{m,x,y,depth,sel}=it;
  const base=Math.min(W,H)*.155,ds=.44+depth*.56,ss=sel?1.2:1;
  const sz=base*ds*ss,al=.3+depth*.7;
  const[r,g,b]=m.rgb;

  ctx.save();ctx.globalAlpha=al;ctx.translate(x,y);

  if(sel){
    const hg=ctx.createRadialGradient(0,0,sz*.3,0,0,sz*2);
    hg.addColorStop(0,`rgba(${r},${g},${b},.18)`);hg.addColorStop(1,'transparent');
    ctx.fillStyle=hg;ctx.globalAlpha=al*.7;ctx.beginPath();ctx.arc(0,0,sz*2,0,Math.PI*2);ctx.fill();
    ctx.globalAlpha=al;
  }

  // Drop shadow (light theme)
  ctx.shadowColor=sel?`rgba(${r},${g},${b},.35)`:'rgba(44,24,16,.1)';
  ctx.shadowBlur=sel?28:12;ctx.shadowOffsetY=sel?4:3;

  const h=sz/2,rad=sz*.28;
  rrect(ctx,-h,-h,sz,sz,rad);

  // Card fill
  const bg=ctx.createLinearGradient(-h,-h,h,h);
  if(sel){
    bg.addColorStop(0,`rgba(${r},${g},${b},.18)`);
    bg.addColorStop(1,`rgba(${r},${g},${b},.06)`);
  } else {
    bg.addColorStop(0,'rgba(255,254,251,.85)');
    bg.addColorStop(1,'rgba(245,240,232,.7)');
  }
  ctx.fillStyle=bg;ctx.fill();

  ctx.shadowBlur=0;ctx.shadowOffsetY=0;
  rrect(ctx,-h,-h,sz,sz,rad);
  ctx.strokeStyle=sel?`rgba(${r},${g},${b},.7)`:'rgba(166,124,46,.28)';
  ctx.lineWidth=sel?1.8:1;ctx.stroke();

  // Top shimmer
  rrect(ctx,-h+1,-h+1,sz-2,sz*.38,rad);
  const sh=ctx.createLinearGradient(-h,-h,0,0);
  sh.addColorStop(0,'rgba(255,255,255,.6)');sh.addColorStop(1,'rgba(255,255,255,0)');
  ctx.fillStyle=sh;ctx.fill();

  // Gold accent bar (selected)
  if(sel){
    rrect(ctx,-h,-h,sz,sz*.04,0);
    ctx.fillStyle=`rgba(${r},${g},${b},.8)`;ctx.fill();
  }

  ctx.globalAlpha=al*(sel?1:.75);drawIcon(ctx,m,sz);

  if(depth>.48){
    const la=Math.pow((depth-.48)/.52,1.5);
    ctx.globalAlpha=al*la;ctx.fillStyle=sel?m.col:'rgba(61,43,24,.7)';
    const fs=Math.max(8,Math.round(8.5*ds*ss));
    ctx.font=`${sel?'700':'500'} ${fs}px Outfit,sans-serif`;
    ctx.textAlign='center';ctx.textBaseline='top';
    ctx.fillText(m.name,0,h+9*ds);
  }
  ctx.restore();
}

function drawIcon(ctx,m,sz){
  const s=sz*.22,lw=Math.max(1.5,sz*.025);
  ctx.save();ctx.strokeStyle=m.col;ctx.fillStyle=m.col;
  ctx.lineWidth=lw;ctx.lineCap='round';ctx.lineJoin='round';
  switch(m.icon){
    case'box':iBox(ctx,s);break;case'flame':iFlame(ctx,s);break;
    case'cup':iCup(ctx,s);break;case'chart':iChart(ctx,s);break;
    case'qr':iQR(ctx,s);break;case'graph':iGraph(ctx,s);break;
    case'people':iPeople(ctx,s);break;case'book':iBook(ctx,s);break;
  }
  ctx.restore();
}
function iBox(ctx,s){const h=s*.58;ctx.beginPath();ctx.moveTo(0,-h);ctx.lineTo(h*.85,-h*.4);ctx.lineTo(h*.85,h*.4);ctx.lineTo(0,h);ctx.lineTo(-h*.85,h*.4);ctx.lineTo(-h*.85,-h*.4);ctx.closePath();ctx.stroke();ctx.beginPath();ctx.moveTo(0,-h);ctx.lineTo(0,0);ctx.moveTo(h*.85,-h*.4);ctx.lineTo(0,0);ctx.moveTo(-h*.85,-h*.4);ctx.lineTo(0,0);ctx.stroke();}
function iFlame(ctx,s){ctx.beginPath();ctx.moveTo(0,s*.85);ctx.bezierCurveTo(s*.8,s*.4,s*.9,-s*.1,s*.3,-s*.5);ctx.bezierCurveTo(s*.5,0,s*.1,s*.15,0,-s*.85);ctx.bezierCurveTo(-s*.1,s*.15,-s*.5,0,-s*.3,-s*.5);ctx.bezierCurveTo(-s*.9,-s*.1,-s*.8,s*.4,0,s*.85);ctx.stroke();ctx.beginPath();ctx.arc(0,s*.2,s*.2,0,Math.PI*2);ctx.stroke();}
function iCup(ctx,s){ctx.beginPath();ctx.moveTo(-s*.65,-s*.5);ctx.lineTo(-s*.5,s*.6);ctx.lineTo(s*.5,s*.6);ctx.lineTo(s*.65,-s*.5);ctx.closePath();ctx.stroke();ctx.beginPath();ctx.moveTo(s*.65,-s*.1);ctx.bezierCurveTo(s*1.1,-s*.1,s*1.1,s*.35,s*.65,s*.35);ctx.stroke();ctx.beginPath();ctx.moveTo(-s*.65,-s*.5);ctx.lineTo(s*.65,-s*.5);ctx.stroke();}
function iChart(ctx,s){[[-s*.5,s*.45],[-s*.16,s*.05],[s*.16,s*.6],[s*.5,s*.2]].forEach(([bx,th])=>{ctx.beginPath();ctx.rect(bx-s*.13,th-s*.88,s*.26,s*.88-th+s*.88);ctx.stroke();});ctx.beginPath();ctx.moveTo(-s*.75,s*.85);ctx.lineTo(s*.75,s*.85);ctx.stroke();}
function iQR(ctx,s){const gs=s*.32;[[-1,-1],[1,-1],[-1,1]].forEach(([gx,gy])=>{ctx.beginPath();ctx.rect(gx*s*.5-gs/2,gy*s*.5-gs/2,gs,gs);ctx.stroke();ctx.beginPath();ctx.rect(gx*s*.5-gs/4,gy*s*.5-gs/4,gs/2,gs/2);ctx.fill();});[s*.2,- s*.15].forEach(ox=>[s*.2,-s*.15].forEach(oy=>{if(ox===s*.2&&oy===s*.2)return;ctx.beginPath();ctx.rect(ox,oy,gs*.6,gs*.6);ctx.stroke();}));}
function iGraph(ctx,s){ctx.beginPath();ctx.moveTo(-s*.8,s*.4);ctx.lineTo(-s*.4,0);ctx.lineTo(0,s*.15);ctx.lineTo(s*.4,-s*.55);ctx.lineTo(s*.8,-s*.7);ctx.stroke();ctx.beginPath();ctx.arc(s*.8,-s*.7,s*.1,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.moveTo(-s*.8,s*.8);ctx.lineTo(-s*.8,-s*.8);ctx.moveTo(-s*.8,s*.8);ctx.lineTo(s*.8,s*.8);ctx.stroke();}
function iPeople(ctx,s){ctx.beginPath();ctx.arc(-s*.25,-s*.45,s*.28,0,Math.PI*2);ctx.stroke();ctx.beginPath();ctx.moveTo(-s*.8,s*.85);ctx.quadraticCurveTo(-s*.8,s*.15,-s*.25,s*.15);ctx.quadraticCurveTo(s*.3,s*.15,s*.3,s*.85);ctx.stroke();ctx.beginPath();ctx.arc(s*.4,-s*.55,s*.2,0,Math.PI*2);ctx.stroke();ctx.beginPath();ctx.moveTo(s*.05,s*.85);ctx.quadraticCurveTo(s*.05,s*.25,s*.4,s*.25);ctx.quadraticCurveTo(s*.8,s*.25,s*.8,s*.85);ctx.stroke();}
function iBook(ctx,s){ctx.beginPath();ctx.rect(-s*.8,-s*.85,s*.75,s*1.7);ctx.stroke();ctx.beginPath();ctx.rect(s*.05,-s*.85,s*.75,s*1.7);ctx.stroke();ctx.beginPath();ctx.moveTo(-s*.05,-s*.85);ctx.lineTo(-s*.05,s*.85);ctx.stroke();[.28,.52,.72].forEach(yf=>{ctx.beginPath();ctx.moveTo(-s*.7,-s*.85+s*1.7*yf);ctx.lineTo(-s*.15,-s*.85+s*1.7*yf);ctx.moveTo(s*.15,-s*.85+s*1.7*yf);ctx.lineTo(s*.7,-s*.85+s*1.7*yf);ctx.stroke();});}
function rrect(ctx,x,y,w,h,r){const mr=Math.min(r,w/2,h/2);ctx.beginPath();ctx.moveTo(x+mr,y);ctx.arcTo(x+w,y,x+w,y+h,mr);ctx.arcTo(x+w,y+h,x,y+h,mr);ctx.arcTo(x,y+h,x,y,mr);ctx.arcTo(x,y,x+w,y,mr);ctx.closePath();}

function drawRoastChart(){
  const canvas=document.getElementById('roast-chart');if(!canvas)return;
  const W2=canvas.width,H2=canvas.height,c=canvas.getContext('2d');
  c.clearRect(0,0,W2,H2);
  // Grid lines
  c.strokeStyle='rgba(166,124,46,0.1)';c.lineWidth=1;
  for(let i=0;i<=5;i++){const y=24+(H2-44)*(i/5);c.beginPath();c.moveTo(48,y);c.lineTo(W2-12,y);c.stroke();c.fillStyle='rgba(61,43,24,0.45)';c.font='13px Space Mono,monospace';c.textAlign='right';c.fillText((230-i*17)+'°',44,y+4);}
  for(let i=0;i<=11;i++){const x=48+(W2-60)*(i/11);c.beginPath();c.moveTo(x,24);c.lineTo(x,H2-20);c.stroke();c.fillStyle='rgba(61,43,24,0.45)';c.font='12px Space Mono,monospace';c.textAlign='center';c.fillText(i+'m',x,H2-6);}
  // Curve data
  const pts2=[[0,50],[1,80],[2,105],[3,128],[4,148],[5,162],[6,172],[7,179],[8,183],[9,186],[10,189],[11,192]].map(([t,temp])=>({x:48+(W2-60)*(t/11),y:24+(H2-44)*((230-temp)/85)}));
  // Fill
  const gr=c.createLinearGradient(0,0,0,H2);
  gr.addColorStop(0,'rgba(166,124,46,0.22)');gr.addColorStop(1,'rgba(166,124,46,0)');
  c.beginPath();c.moveTo(pts2[0].x,H2-20);pts2.forEach(p=>c.lineTo(p.x,p.y));c.lineTo(pts2[pts2.length-1].x,H2-20);c.closePath();c.fillStyle=gr;c.fill();
  // Line
  c.beginPath();c.moveTo(pts2[0].x,pts2[0].y);
  for(let i=1;i<pts2.length-1;i++){const mx=(pts2[i].x+pts2[i+1].x)/2,my=(pts2[i].y+pts2[i+1].y)/2;c.quadraticCurveTo(pts2[i].x,pts2[i].y,mx,my);}
  c.lineTo(pts2[pts2.length-1].x,pts2[pts2.length-1].y);
  c.strokeStyle='#A67C2E';c.lineWidth=2.5;c.stroke();
  // First crack marker
  const fcX=48+(W2-60)*(10/11);
  c.setLineDash([4,6]);c.strokeStyle='rgba(166,124,46,0.5)';c.lineWidth=1;c.beginPath();c.moveTo(fcX,24);c.lineTo(fcX,H2-20);c.stroke();c.setLineDash([]);
  c.fillStyle='rgba(166,124,46,0.8)';c.font='12px Outfit,sans-serif';c.textAlign='left';c.fillText('1st Crack',fcX+4,36);
  // End dot
  const last=pts2[pts2.length-1];c.beginPath();c.arc(last.x,last.y,5,0,Math.PI*2);c.fillStyle='#A67C2E';c.fill();
  c.fillStyle='rgba(61,43,24,0.7)';c.textAlign='right';c.font='12px Outfit,sans-serif';c.fillText('195°C',last.x-8,last.y-8);
}
function drawQRCanvas(){
  const c2=document.getElementById('qr-canvas');if(!c2)return;
  const ctx2=c2.getContext('2d'),S=72;
  ctx2.fillStyle='#FFFEFB';ctx2.fillRect(0,0,S,S);
  ctx2.fillStyle='#1C1208';
  const cs=9,pad=4;
  [[0,0,3],[4,0,3],[0,4,3],[1,1,1],[5,1,1],[1,5,1],[3,2,1],[2,3,1],[3,4,1],[4,3,1]].forEach(([gx,gy,gs])=>{
    ctx2.fillRect(pad+gx*cs,pad+gy*cs,gs*cs-1,gs*cs-1);
  });
  ctx2.fillStyle='#FFFEFB';
  [[1,1],[5,1],[1,5]].forEach(([gx,gy])=>ctx2.fillRect(pad+gx*cs+2,pad+gy*cs+2,cs-4,cs-4));
  ctx2.fillStyle='#1C1208';
  [[1,1],[5,1],[1,5]].forEach(([gx,gy])=>ctx2.fillRect(pad+gx*cs+cs/2-1,pad+gy*cs+cs/2-1,3,3));
}
